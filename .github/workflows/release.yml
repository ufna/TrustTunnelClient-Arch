name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm base-devel cmake qt6-base qt6-svg git

      - uses: actions/checkout@v4

      - name: Build Arch package
        run: |
          useradd -m builder
          chown -R builder: .
          su builder -c 'BUILDDIR=makepkg-builddir makepkg --noconfirm'
          PKG=$(ls trusttunnel-tray-*.pkg.tar.zst | grep -v debug)
          echo "PKG=${PKG}" >> "$GITHUB_ENV"
          echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TrustTunnel Tray Agent v${{ env.VERSION }}
          files: ${{ env.PKG }}
          generate_release_notes: true
